<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>傳說對決 限時福利領取</title>
  
  <!-- ======== 分享到 LINE/FB 的预览图设置 ======== -->
  <!-- 标题：LINE 卡片上显示的大标题 -->
  <meta property="og:title" content="傳說對決 限時福利">
  <!-- 描述：标题下面那行小字 -->
  <meta property="og:description" content="參與限時活動，立即開戰！">
  <!-- 预览图：这里就是你 LINE 预览图显示的图片，换图就改这个链接 -->
  <meta property="og:image" content="https://kendingdabao.github.io/kendingdabao.github.io-chuanshuo/garena.jpg">
  <!-- 网站链接：点预览图跳转的地址，建议改成你 Vercel 的新网址 -->
  <meta property="og:url" content="https://himze234.github.io/Himze234.github.io-Garena-moba/">
  <meta property="og:type" content="website">
  <!-- Twitter 卡片用，LINE 也会参考 -->
  <meta name="twitter:card" content="summary_large_image">
  
  <!-- Google 字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
  
  <style>
    /* 全局重置 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* 页面背景：这里用 csdj.jpg 当背景图，要换背景就换这个文件名 */
    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: url("garena.jpg") center center / cover no-repeat fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    
    /* 背景遮罩：让背景变暗，文字更清楚 */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(30, 10, 60, 0.3) 0%, rgba(10, 5, 30, 0.5) 100%);
      backdrop-filter: blur(2px);
      z-index: 0;
    }
    
    /* 飘落粒子特效 */
    .particle {
      position: absolute;
      width: 6px; height: 6px;
      background: radial-gradient(circle, #B8E3FF 0%, #9D50BB 50%, #FFD700 100%);
      border-radius: 50%;
      opacity: 0.8;
      animation: fall linear infinite;
      z-index: 1;
      box-shadow: 0 0 12px #B8E3FF;
    }
    @keyframes fall {
      to { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
    }
    
    /* 中间内容卡片 */
    .container { 
      text-align: center; 
      max-width: 400px;
      position: relative;
      z-index: 2;
      padding: 40px 30px;
      background: rgba(25, 15, 50, 0.4); /* 半透明毛玻璃效果 */
      border-radius: 24px;
      backdrop-filter: blur(16px);
      border: 1.5px solid rgba(184, 227, 255, 0.4);
      box-shadow: 0 8px 32px rgba(157, 80, 187, 0.3), 
                  inset 0 0 30px rgba(184, 227, 255, 0.1);
    }
    
    /* 头像外圈发光环 */
    .avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 16px;
    }
    
    /* 头像：换头像就改 src="csdjlogo.png" */
    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 4px solid #B8E3FF;
      object-fit: cover;
      filter: drop-shadow(0 0 16px rgba(184, 227, 255, 0.8));
      position: relative;
      z-index: 1;
    }
    
    /* 头像旋转彩色光圈 */
    .avatar-wrap::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #B8E3FF, #9D50BB, #FFD700, #00F5FF, #B8E3FF);
      z-index: 0;
      animation: rotate 6s linear infinite;
    }
    @keyframes rotate { to { transform: rotate(360deg); } }
    
    /* 主标题：傳說對決 */
    h1 { 
      font-size: 36px; 
      color: #B8E3FF;
      margin-bottom: 8px; 
      font-weight: 900;
      text-shadow: 0 0 16px rgba(184, 227, 255, 0.8), 0 2px 8px rgba(0, 0, 0, 0.9);
    }
    
    /* 副标题：造型序號領取入口 */
    p { 
      font-size: 16px; 
      color: #E8D5F5; 
      font-weight: 700; 
      margin-bottom: 28px;
      letter-spacing: 1px;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.9);
    }
    
    /* 按钮：立即領取。改跳转链接就改 href="https://lin.ee/pL22P26" */
    .btn {
      background: linear-gradient(90deg, #00D9FF 0%, #9D50BB 50%, #00D9FF 100%);
      background-size: 200% 100%;
      color: #FFFFFF; 
      padding: 16px 56px;
      text-decoration: none; 
      border-radius: 50px;
      font-size: 20px;
      font-weight: 900; 
      display: inline-block;
      transition: all 0.3s;
      border: 2px solid #B8E3FF;
      box-shadow: 0 0 25px rgba(0, 217, 255, 0.7), 
                  0 0 40px rgba(157, 80, 187, 0.5), 
                  inset 0 0 15px rgba(255, 255, 255, 0.2);
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.9);
      animation: gradientFlow 3s ease infinite, neonPulse 1.5s infinite;
    }
    @keyframes gradientFlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    @keyframes neonPulse {
      0%, 100% { box-shadow: 0 0 25px rgba(0, 217, 255, 0.7), 0 0 40px rgba(157, 80, 187, 0.5); }
      50% { box-shadow: 0 0 35px rgba(0, 217, 255, 1), 0 0 60px rgba(157, 80, 187, 0.8); }
    }
    
    .btn:hover { 
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 0 40px rgba(0, 217, 255, 1), 
                  0 0 70px rgba(157, 80, 187, 0.9),
                  inset 0 0 20px rgba(255, 255, 255, 0.3);
    }
    
    .btn:active {
      transform: translateY(0) scale(0.98);
    }
    
    /* 底部小字：© Garena / Tencent Games */
    .badge {
      font-size: 12px;
      color: #B8A8D0;
      margin-top: 16px;
      opacity: 0.7;
    }

    /* 入场动画：渐入上浮 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .container { opacity: 0; animation: fadeInUp 0.8s ease-out 0.2s forwards; }
    .avatar-wrap { opacity: 0; animation: fadeInUp 0.8s ease-out 0.4s forwards; }
    h1 { opacity: 0; animation: fadeInUp 0.8s ease-out 0.6s forwards; }
    p, .btn, .badge { opacity: 0; animation: fadeInUp 0.8s ease-out 0.8s forwards; }
    
  </style>
</head>
<body>
  <!-- 生成12个飘落粒子 -->
  <script>
    for(let i=0; i<12; i++){
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random()*100 + '%';
      particle.style.animationDuration = 3 + Math.random()*4 + 's';
      particle.style.animationDelay = Math.random()*4 + 's';
      particle.style.width = 4 + Math.random()*4 + 'px';
      particle.style.height = particle.style.width;
      document.body.appendChild(particle);
    }
  </script>
  
  <div class="container">
    <div class="avatar-wrap">
      <!-- 头像图片：换图就改 src -->
      <img class="avatar" src="logo.jpg" alt="傳說對決">
    </div>
    <h1>傳說對決</h1>
    <p>造型序號領取入口</p>
    <!-- 按钮跳转链接：改这里换 LINE 群 -->
    <a class="btn" href="https://lin.ee/W3CfWAh">立即領取</a>
    <div class="badge">© Garena / Tencent Games</div>
  </div>
</body>
</html>
